name: Upptime CI
on:
  schedule:
    - cron: "0 * * * *"      # каждый час
  workflow_dispatch:
  push:
    branches:
      - master
jobs:
  summary:
    runs-on: ubuntu-latest
    steps:
      - uses: upptime/uptime-monitor@master
        with:
          command: "update"
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
